services:
  - type: web
    name: impact-registry
    runtime: python
    repo: https://github.com/NSC-Rick/impact_registry
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0
    
    # Persistent disk for workspace storage
    # Mounts to /opt/render/project/src/workspaces on Render
    disk:
      name: impact-registry-workspaces
      mountPath: /opt/render/project/src/workspaces
      sizeGB: 1
    
    # Environment variables
    envVars:
      - key: STREAMLIT_SERVER_HEADLESS
        value: true
      - key: STREAMLIT_SERVER_ENABLE_CORS
        value: false
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: false
